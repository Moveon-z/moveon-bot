# Moveon Bot - AI Personal Assistant
# Test Configuration

spring:
  config:
    activate:
      on-profile: test

  # H2 in-memory database for tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA configuration for tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # Redis - disabled for tests
  data:
    redis:
      host: localhost
      port: 6379

# MinIO - disabled for tests
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: moveon-documents-test

# Logging for tests
logging:
  level:
    root: WARN
    com.moveon: DEBUG

# JWT configuration for tests
jwt:
  secret: test-secret-key
  expiration-ms: 1800000
  refresh-expiration-ms: 604800000

# AI configuration for tests
ai:
  api-key: test-api-key
  model-provider: test
  embedding-model: test-embedding

# Disable actuator for tests
management:
  endpoints:
    web:
      exposure:
        include: none
