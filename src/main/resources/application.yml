# Moveon Bot - AI Personal Assistant
# Default Configuration

spring:
  application:
    name: moveon-bot

  # Profiles
  profiles:
    active: default

  # Jackson JSON configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Multipart file upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

# Server configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Spring Doc OpenAPI configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: tag
    tags-sorter: alpha

# MVC configuration to fix static resource interference
spring.mvc:
  # Only serve static resources from /static/** path
  static-path-pattern: /static/**

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

# Application info
info:
  app:
    name: Moveon Bot
    description: AI Personal Assistant
    version: 0.0.1-SNAPSHOT

# Logging configuration
logging:
  level:
    root: INFO
    com.moveon: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet.mvc.method.annotation: DEBUG
    org.springframework.web.servlet.handler: DEBUG
    org.springframework.beans.factory.support: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

# MinIO configuration (placeholder)
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:moveon-documents}

# Redis configuration (placeholder)
spring.data.redis:
  url: ${REDIS_URL:redis://localhost:6379}

# PostgreSQL configuration (placeholder)
spring.datasource:
  url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/moveon}
  username: ${POSTGRES_USER:moveon}
  password: ${POSTGRES_PASSWORD:moveon}
  driver-class-name: org.postgresql.Driver

# JPA configuration
spring.jpa:
  hibernate:
    ddl-auto: validate
  show-sql: false
  properties:
    hibernate:
      format_sql: true
      dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT configuration
jwt:
  secret: ${JWT_SECRET:moveon-bot-jwt-secret-key-must-be-at-least-32-bytes}
  expiration-ms: 1800000  # 30 minutes
  refresh-expiration-ms: 604800000  # 7 days

# AI configuration (placeholder)
ai:
  api-key: ${AI_API_KEY:}
  model-provider: ${AI_MODEL_PROVIDER:aliyun}
  base-url: ${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  embedding-model: ${AI_EMBEDDING_MODEL:text-embedding-v2}
